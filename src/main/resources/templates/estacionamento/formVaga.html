<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title>Garagem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <header>
        <h1>Garagem</h1>
        <nav>
          <a th:href="@{/cadastrarVaga}">Cadastrar Vaga</a>

          <a th:href="@{/vaga}">Lista de Vagas</a>
        </nav>
    </header>
    <div class="container">
      <h2>Cadastrar Vaga</h2>
      <form th:action="@{/cadastrarVaga)" th: object="$(vaga)" method="post" class="form-grid">
        <input type="hidden" th: field="*{codigo}">
        <label for="placa"><i class="fas fa-car"></i> Placa: </label>
        <input type="text" id="placa" th: field="*{placa}" required>
        <span th:if="${#fields.has Errors('placa')}" th:errors="*{placa}" class="error"></span>
        <label for="veiculo"><i class="fas fa-car-side"></i> Veículo:</label>
        <input type="text" id="veiculo" th: field="*{veiculo}" required>
        <span th: if="${#fields.hasErrors('veiculo')}" th:errors="*{veiculo}" class="error"></span>
        <label for="data"><i class="fas fa-calendar-alt"></i> Data:</label>
        <input type="date" id="data" th: field="#{data}" required>
        <span th:if="${#fields.hasErrors('data')}" th:errors="*{data}" class="error"></span>
        <label for="hentrada"><i class="fas fa-sign-in-alt"></i> Hora Entrada: </label>
        <input type="time" id="hentrada" th: field="*{hentrada}" required>
        <span th: if="${#fields.hasErrors('hentrada')}" th: errors="*{hentrada}" class="error"></span>
        <label for="hsaida"><i class="fas fa-sign-out-alt"></i> Hora Saída:</label>
        <input type="time" id="hsaida" th: field="*{hsaida}" required>
        <span th: if="${#fields.hasErrors('hsaida')}" th: errors="*{hsaida}" class="error"></span>
        <label for="valor"><i class="fas fa-dollar-sign"></i> Valor: </label>
        <input type="text" id="valor" th: field="*{valor}" required>
        <span th: if="${#fields.has Errors('valor')}" th:errors="*{valor}" class="error"></span>
        <div class="form-botoes">
          <button type="submit" class="botao-link" onclick="confirmarAtualizacao(event)">
            <i class="fas fa-save"></i> Salvar Vaga</button>
          <a th:href="@{/vaga}" class="botao-link"><i class="fas fa-list"></i> Ver Lista</a>
          <button type="reset" class="botao-link botao-Limpar"><i class="fas fa-eraser"></i> Limpar</button>
        </div>
      </form>
    </div>
    <script th:if="${mensagem != null}">
      Swal.fire({
        toast: true,
        position: 'top-end',
        icon: 'success',
        title: '[[${mensagem}]]',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true
      });
    </script>
    <script>
      function confirmarAtualizacao (event) {
        const id = document.getElementById("codigo").value;
        if (parseInt(id) > 0) {
          const confirmar confirm("Deseja realmente atualizar os dados desta vaga?");
          if (!confirmar) {
            event.preventDefault(); // cancela o envio
          }
        }
      }
    </script>
  </body>
</html>
